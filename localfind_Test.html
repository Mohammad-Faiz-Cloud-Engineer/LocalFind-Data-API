<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalFind API Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-bg: #ffffff;
            --color-surface: #f8f9fa;
            --color-surface-hover: #f1f3f5;
            --color-border: #e9ecef;
            --color-border-hover: #dee2e6;
            --color-text-primary: #212529;
            --color-text-secondary: #6c757d;
            --color-text-tertiary: #adb5bd;
            --color-primary: #2563eb;
            --color-primary-hover: #1d4ed8;
            --color-primary-light: #dbeafe;
            --color-success: #16a34a;
            --color-success-light: #dcfce7;
            --color-warning: #ea580c;
            --color-warning-light: #ffedd5;
            --color-danger: #dc2626;
            --color-danger-light: #fee2e2;
            --color-info: #0891b2;
            --color-info-light: #cffafe;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --radius-sm: 4px;
            --radius-md: 6px;
            --radius-lg: 8px;
            --radius-xl: 12px;
            --ease-out: cubic-bezier(0.33, 1, 0.68, 1);
            --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fafbfc;
            color: var(--color-text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: 5px;
            border: 2px solid transparent;
            background-clip: padding-box;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--color-text-tertiary);
            border: 2px solid transparent;
            background-clip: padding-box;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Header */
        .header {
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            padding: 24px 32px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .brand-logo {
            width: 40px;
            height: 40px;
            background: var(--color-primary);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .brand-info h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--color-text-primary);
            margin-bottom: 2px;
        }

        .brand-info p {
            font-size: 13px;
            color: var(--color-text-secondary);
            font-weight: 500;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 600;
            color: var(--color-success);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--color-success);
            border-radius: 50%;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: 20px;
            transition: border-color 0.15s var(--ease-out), box-shadow 0.15s var(--ease-out);
            cursor: default;
        }

        .stat-card:hover {
            border-color: var(--color-border-hover);
            box-shadow: var(--shadow-md);
        }

        .stat-card:hover .stat-icon {
            background: var(--color-primary-light);
            color: var(--color-primary);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .stat-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-icon {
            width: 36px;
            height: 36px;
            background: var(--color-surface);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-primary);
            font-size: 16px;
            transition: background-color 0.15s var(--ease-out), color 0.15s var(--ease-out);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--color-text-primary);
            line-height: 1;
        }

        /* Main Content */
        .main-content {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 24px;
        }

        /* Control Panel */
        .control-panel {
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            padding: 24px;
            height: fit-content;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 24px;
        }

        .panel-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--color-text-primary);
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--color-border);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: 8px;
        }

        select, input {
            width: 100%;
            padding: 10px 12px;
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: inherit;
            color: var(--color-text-primary);
            transition: border-color 0.15s var(--ease-out), box-shadow 0.15s var(--ease-out);
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08);
        }

        select:hover:not(:focus), input:hover:not(:focus) {
            border-color: var(--color-border-hover);
        }

        input::placeholder {
            color: var(--color-text-tertiary);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-primary {
            width: 100%;
            padding: 12px 20px;
            background: var(--color-primary);
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.15s var(--ease-out), box-shadow 0.15s var(--ease-out);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            background: var(--color-primary-hover);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn-primary:active {
            background: #1e40af;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.2);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Results Section */
        .results-section {
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            min-height: 400px;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--color-border);
        }

        .results-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--color-text-primary);
        }

        .results-count {
            padding: 6px 12px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            color: var(--color-text-secondary);
        }

        /* Business Card */
        .business-card {
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 16px;
            transition: border-color 0.15s var(--ease-out), box-shadow 0.15s var(--ease-out);
        }

        .business-card:hover {
            border-color: var(--color-border-hover);
            box-shadow: var(--shadow-md);
        }

        .business-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .business-title-row {
            flex: 1;
        }

        .business-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--color-text-primary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-featured {
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fde68a;
        }

        .badge-verified {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .category-tag {
            padding: 6px 12px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            color: var(--color-text-secondary);
        }

        .expand-btn {
            width: 32px;
            height: 32px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.15s var(--ease-out), border-color 0.15s var(--ease-out), color 0.15s var(--ease-out);
            color: var(--color-text-secondary);
            flex-shrink: 0;
        }

        .expand-btn:hover {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: white;
        }

        .expand-btn.active {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: white;
        }

        .expand-btn i {
            transition: transform 0.2s var(--ease-in-out);
        }

        .expand-btn.active i {
            transform: rotate(180deg);
        }

        .business-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 12px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--color-text-secondary);
        }

        .meta-icon {
            width: 16px;
            text-align: center;
            color: var(--color-text-tertiary);
        }

        .business-description {
            color: var(--color-text-secondary);
            line-height: 1.6;
            font-size: 14px;
        }

        .business-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s var(--ease-in-out);
        }

        .business-details.show {
            max-height: 5000px;
        }

        .details-content {
            padding-top: 20px;
            border-top: 1px solid var(--color-border);
            margin-top: 16px;
        }

        .detail-section {
            margin-bottom: 24px;
        }

        .detail-section h3 {
            font-size: 14px;
            font-weight: 700;
            color: var(--color-text-primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 12px;
            background: var(--color-surface);
            padding: 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--color-border);
        }

        .detail-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-size: 14px;
            color: var(--color-text-secondary);
        }

        .detail-item strong {
            color: var(--color-text-primary);
            font-weight: 600;
        }

        .detail-item a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
        }

        .detail-item a:hover {
            text-decoration: underline;
        }

        .hours-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 8px;
        }

        .hour-card {
            background: var(--color-bg);
            padding: 12px;
            border-radius: var(--radius-md);
            border: 1px solid var(--color-border);
            text-align: center;
            transition: border-color 0.15s var(--ease-out);
        }

        .hour-card:hover {
            border-color: var(--color-border-hover);
        }

        .hour-day {
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            color: var(--color-text-primary);
        }

        .hour-time {
            color: var(--color-text-secondary);
            font-size: 13px;
            font-weight: 500;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            padding: 6px 12px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            color: var(--color-text-secondary);
            transition: background-color 0.15s var(--ease-out), border-color 0.15s var(--ease-out), color 0.15s var(--ease-out);
            cursor: pointer;
        }

        .tag:hover {
            background: var(--color-primary-light);
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .reviews-container {
            display: grid;
            gap: 12px;
        }

        .review-card {
            background: var(--color-surface);
            padding: 16px;
            border-radius: var(--radius-md);
            border-left: 3px solid var(--color-primary);
            transition: background-color 0.15s var(--ease-out);
        }

        .review-card:hover {
            background: var(--color-bg);
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .review-author {
            font-weight: 700;
            font-size: 14px;
            color: var(--color-text-primary);
        }

        .review-role {
            color: var(--color-text-secondary);
            font-size: 13px;
            font-weight: 500;
        }

        .review-rating {
            color: var(--color-warning);
            font-size: 14px;
        }

        .review-date {
            font-size: 12px;
            color: var(--color-text-tertiary);
            margin-top: 4px;
        }

        .review-text {
            color: var(--color-text-secondary);
            line-height: 1.6;
            font-size: 14px;
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }

        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: background-color 0.15s var(--ease-out), box-shadow 0.15s var(--ease-out);
            border: 1px solid;
        }

        .action-btn-primary {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: white;
        }

        .action-btn-primary:hover {
            background: var(--color-primary-hover);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .action-btn-primary:active {
            background: #1e40af;
        }

        .action-btn-success {
            background: var(--color-success);
            border-color: var(--color-success);
            color: white;
        }

        .action-btn-success:hover {
            background: #15803d;
            box-shadow: 0 4px 12px rgba(22, 163, 74, 0.2);
        }

        .action-btn-success:active {
            background: #166534;
        }

        .action-btn-danger {
            background: var(--color-danger);
            border-color: var(--color-danger);
            color: white;
        }

        .action-btn-danger:hover {
            background: #b91c1c;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2);
        }

        .action-btn-danger:active {
            background: #991b1b;
        }

        .loading-state, .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--color-border);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text, .empty-text {
            font-size: 14px;
            color: var(--color-text-secondary);
            font-weight: 600;
        }

        .empty-icon {
            font-size: 48px;
            color: var(--color-text-tertiary);
            margin-bottom: 16px;
        }

        .error-state {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: var(--radius-md);
            padding: 16px;
            color: var(--color-danger);
        }

        .error-state strong {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            box-shadow: var(--shadow-xl);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 300px;
            transform: translateX(400px);
            opacity: 0;
            transition: transform 0.3s var(--ease-out), opacity 0.3s var(--ease-out);
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        .toast-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .toast-success { border-left: 3px solid var(--color-success); }
        .toast-error { border-left: 3px solid var(--color-danger); }
        .toast-info { border-left: 3px solid var(--color-info); }

        .toast-message {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
            color: var(--color-text-primary);
        }

        /* Skeleton Loader */
        .skeleton {
            background: linear-gradient(90deg, var(--color-surface) 25%, var(--color-border) 50%, var(--color-surface) 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s ease-in-out infinite;
            border-radius: var(--radius-md);
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-card {
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 16px;
        }

        .skeleton-title {
            height: 24px;
            width: 60%;
            margin-bottom: 16px;
        }

        .skeleton-text {
            height: 16px;
            width: 100%;
            margin-bottom: 8px;
        }

        .skeleton-text:last-child {
            width: 80%;
        }

        /* Keyboard Shortcut Hint */
        .kbd {
            display: inline-block;
            padding: 2px 6px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-weight: 600;
            font-family: 'Inter', monospace;
            color: var(--color-text-secondary);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .shortcut-hint {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--color-text-tertiary);
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--color-border);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .business-name {
                font-size: 16px;
            }

            .stat-value {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-brand">
                <div class="brand-logo">
                    <i class="fas fa-map-marked-alt"></i>
                </div>
                <div class="brand-info">
                    <h1>LocalFind API</h1>
                    <p>localfind-localfind.hf.space</p>
                </div>
            </div>
            <div class="status-badge">
                <span class="status-dot"></span>
                <span>API Online</span>
            </div>
        </header>

        <div class="stats-grid" id="statsGrid"></div>

        <div class="main-content">
            <aside class="control-panel">
                <h2 class="panel-title">API Explorer</h2>

                <div class="form-group">
                    <label class="form-label">Endpoint</label>
                    <select id="endpoint">
                        <option value="businesses">Get All Businesses</option>
                        <option value="categories">Get Categories</option>
                        <option value="stats">Get Statistics</option>
                        <option value="search">Search Businesses</option>
                        <option value="health">Health Check</option>
                    </select>
                </div>

                <div class="form-group" id="searchGroup" style="display: none;">
                    <label class="form-label">Search Query</label>
                    <input type="text" id="searchQuery" placeholder="Enter search term...">
                </div>

                <div id="filterGroup">
                    <div class="form-group">
                        <label class="form-label">Filters</label>
                        <div class="form-grid">
                            <select id="filterFeatured">
                                <option value="">All Businesses</option>
                                <option value="true">Featured Only</option>
                            </select>
                            <select id="filterCategory">
                                <option value="">All Categories</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Limit Results</label>
                        <input type="number" id="filterLimit" placeholder="Optional" min="1">
                    </div>
                </div>

                <button class="btn-primary" onclick="fetchData()">
                    <i class="fas fa-play"></i>
                    <span>Execute Request</span>
                </button>

                <div class="shortcut-hint">
                    <i class="fas fa-keyboard"></i>
                    <span>Press <kbd class="kbd">Ctrl</kbd> + <kbd class="kbd">Enter</kbd> to execute</span>
                </div>
            </aside>

            <main class="results-section">
                <div class="results-header">
                    <h2 class="results-title">Results</h2>
                    <div class="results-count" id="resultsCount"></div>
                </div>
                <div id="results">
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-inbox"></i>
                        </div>
                        <div class="empty-text">Select an endpoint and execute request</div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const API_BASE = 'https://localfind-localfind.hf.space/api';

        window.addEventListener('DOMContentLoaded', () => {
            loadStats();
            loadCategories();
            initKeyboardShortcuts();
        });

        document.getElementById('endpoint').addEventListener('change', (e) => {
            const endpoint = e.target.value;
            document.getElementById('searchGroup').style.display = endpoint === 'search' ? 'block' : 'none';
            document.getElementById('filterGroup').style.display = endpoint === 'businesses' ? 'block' : 'none';
        });

        // Keyboard shortcuts
        function initKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                // Ctrl/Cmd + Enter to execute
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    fetchData();
                }
                // Escape to close expanded cards
                if (e.key === 'Escape') {
                    document.querySelectorAll('.business-details.show').forEach(detail => {
                        detail.classList.remove('show');
                        const btn = detail.previousElementSibling.querySelector('.expand-btn');
                        if (btn) btn.classList.remove('active');
                    });
                }
            });
        }

        // Toast notification
        function showToast(message, type = 'info') {
            const existingToast = document.querySelector('.toast');
            if (existingToast) existingToast.remove();

            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            
            const icon = type === 'success' ? 'fa-check-circle' : 
                        type === 'error' ? 'fa-exclamation-circle' : 
                        'fa-info-circle';
            
            toast.innerHTML = `
                <div class="toast-icon">
                    <i class="fas ${icon}" style="color: var(--color-${type})"></i>
                </div>
                <div class="toast-message">${message}</div>
            `;
            
            document.body.appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Skeleton loader
        function showSkeletonLoader() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = Array(3).fill(0).map(() => `
                <div class="skeleton-card">
                    <div class="skeleton skeleton-title"></div>
                    <div class="skeleton skeleton-text"></div>
                    <div class="skeleton skeleton-text"></div>
                    <div class="skeleton skeleton-text"></div>
                </div>
            `).join('');
        }

        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/stats`);
                const data = await response.json();
                
                if (data.success) {
                    const stats = data.data;
                    document.getElementById('statsGrid').innerHTML = `
                        <div class="stat-card">
                            <div class="stat-header">
                                <span class="stat-label">Total Businesses</span>
                                <div class="stat-icon">
                                    <i class="fas fa-building"></i>
                                </div>
                            </div>
                            <div class="stat-value">${stats.totalBusinesses}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-header">
                                <span class="stat-label">Categories</span>
                                <div class="stat-icon">
                                    <i class="fas fa-folder"></i>
                                </div>
                            </div>
                            <div class="stat-value">${stats.categories}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-header">
                                <span class="stat-label">Average Rating</span>
                                <div class="stat-icon">
                                    <i class="fas fa-star"></i>
                                </div>
                            </div>
                            <div class="stat-value">${stats.averageRating}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-header">
                                <span class="stat-label">Featured</span>
                                <div class="stat-icon">
                                    <i class="fas fa-certificate"></i>
                                </div>
                            </div>
                            <div class="stat-value">${stats.featuredBusinesses}</div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function loadCategories() {
            try {
                const response = await fetch(`${API_BASE}/categories`);
                const data = await response.json();
                
                if (data.success) {
                    const select = document.getElementById('filterCategory');
                    data.data.forEach(cat => {
                        const option = document.createElement('option');
                        option.value = cat.slug;
                        option.textContent = `${cat.name} (${cat.count})`;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        async function fetchData() {
            const endpoint = document.getElementById('endpoint').value;
            const resultsDiv = document.getElementById('results');
            const resultsCount = document.getElementById('resultsCount');
            
            showSkeletonLoader();
            resultsCount.textContent = '';
            
            try {
                let url = `${API_BASE}/${endpoint}`;
                const params = new URLSearchParams();
                
                if (endpoint === 'businesses') {
                    const featured = document.getElementById('filterFeatured').value;
                    const category = document.getElementById('filterCategory').value;
                    const limit = document.getElementById('filterLimit').value;
                    
                    if (featured) params.append('featured', featured);
                    if (category) params.append('category', category);
                    if (limit) params.append('limit', limit);
                } else if (endpoint === 'search') {
                    const query = document.getElementById('searchQuery').value;
                    if (!query) {
                        resultsDiv.innerHTML = '<div class="error-state"><strong>Error</strong>Please enter a search query</div>';
                        showToast('Please enter a search query', 'error');
                        return;
                    }
                    params.append('q', query);
                }
                
                if (params.toString()) url += '?' + params.toString();
                
                const response = await fetch(url);
                const data = await response.json();
                
                displayResults(data, endpoint);
                showToast('Data loaded successfully', 'success');
                
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error-state"><strong>Error</strong>${error.message}</div>`;
                showToast('Failed to load data', 'error');
            }
        }

        function toggleDetails(index) {
            const details = document.getElementById(`details-${index}`);
            const btn = document.getElementById(`btn-${index}`);
            
            if (details.classList.contains('show')) {
                details.classList.remove('show');
                btn.classList.remove('active');
            } else {
                details.classList.add('show');
                btn.classList.add('active');
            }
        }

        function displayResults(data, endpoint) {
            const resultsDiv = document.getElementById('results');
            const resultsCount = document.getElementById('resultsCount');
            
            if (endpoint === 'health') {
                resultsCount.textContent = 'System Status';
                resultsDiv.innerHTML = `
                    <div class="business-card">
                        <div class="business-header">
                            <div class="business-title-row">
                                <div class="business-name">
                                    <span>API Status: ${data.status.toUpperCase()}</span>
                                </div>
                            </div>
                        </div>
                        <div class="business-meta">
                            <div class="meta-item">
                                <i class="fas fa-clock meta-icon"></i>
                                <span>Uptime: ${Math.floor(data.uptime)}s</span>
                            </div>
                            <div class="meta-item">
                                <i class="fas fa-calendar meta-icon"></i>
                                <span>${new Date(data.timestamp).toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                `;
                return;
            }
            
            if (endpoint === 'stats') {
                resultsCount.textContent = 'API Statistics';
                const stats = data.data;
                resultsDiv.innerHTML = `
                    <div class="business-card">
                        <div class="business-header">
                            <div class="business-title-row">
                                <div class="business-name">Complete Statistics</div>
                            </div>
                        </div>
                        <div class="detail-grid">
                            <div class="detail-item"><i class="fas fa-building meta-icon"></i> <strong>Total:</strong> ${stats.totalBusinesses}</div>
                            <div class="detail-item"><i class="fas fa-certificate meta-icon"></i> <strong>Featured:</strong> ${stats.featuredBusinesses}</div>
                            <div class="detail-item"><i class="fas fa-check-circle meta-icon"></i> <strong>Verified:</strong> ${stats.verifiedBusinesses}</div>
                            <div class="detail-item"><i class="fas fa-door-open meta-icon"></i> <strong>Open:</strong> ${stats.openBusinesses}</div>
                            <div class="detail-item"><i class="fas fa-door-closed meta-icon"></i> <strong>Closed:</strong> ${stats.closedBusinesses}</div>
                            <div class="detail-item"><i class="fas fa-plus-circle meta-icon"></i> <strong>New:</strong> ${stats.newBusinesses}</div>
                            <div class="detail-item"><i class="fas fa-star meta-icon"></i> <strong>Avg Rating:</strong> ${stats.averageRating}</div>
                            <div class="detail-item"><i class="fas fa-comments meta-icon"></i> <strong>Reviews:</strong> ${stats.totalReviews}</div>
                            <div class="detail-item"><i class="fas fa-folder meta-icon"></i> <strong>Categories:</strong> ${stats.categories}</div>
                        </div>
                    </div>
                `;
                return;
            }
            
            if (endpoint === 'categories') {
                resultsCount.textContent = `${data.total} Categories`;
                resultsDiv.innerHTML = data.data.map(cat => `
                    <div class="business-card">
                        <div class="business-header">
                            <div class="business-title-row">
                                <div class="business-name">${cat.name}</div>
                            </div>
                        </div>
                        <div class="business-meta">
                            <div class="meta-item">
                                <i class="fas fa-tag meta-icon"></i>
                                <span>Slug: <strong>${cat.slug}</strong></span>
                            </div>
                            <div class="meta-item">
                                <i class="fas fa-chart-bar meta-icon"></i>
                                <span><strong>${cat.count}</strong> businesses</span>
                            </div>
                        </div>
                    </div>
                `).join('');
                return;
            }

            const businesses = data.data || [];
            
            if (businesses.length === 0) {
                resultsCount.textContent = '';
                resultsDiv.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-search"></i>
                        </div>
                        <div class="empty-text">No results found</div>
                    </div>
                `;
                return;
            }
            
            resultsCount.textContent = `${data.count || businesses.length} of ${data.total || businesses.length} results`;

            resultsDiv.innerHTML = businesses.map((business, index) => `
                <div class="business-card">
                    <div class="business-header">
                        <div class="business-title-row">
                            <div class="business-name">
                                <span>${business.name}</span>
                                ${business.featured ? '<span class="badge badge-featured">Featured</span>' : ''}
                                ${business.verified ? '<span class="badge badge-verified">Verified</span>' : ''}
                            </div>
                            <span class="category-tag">${business.category}</span>
                        </div>
                        <button class="expand-btn" id="btn-${index}" onclick="toggleDetails(${index})">
                            <i class="fas fa-chevron-down"></i>
                        </button>
                    </div>
                    
                    <div class="business-meta">
                        <div class="meta-item">
                            <i class="fas fa-star meta-icon"></i>
                            <span>${business.rating} (${business.reviewCount} reviews)</span>
                        </div>
                        <div class="meta-item">
                            <i class="fas fa-phone meta-icon"></i>
                            <span>${business.phone}</span>
                        </div>
                        <div class="meta-item">
                            <i class="fas fa-envelope meta-icon"></i>
                            <span>${business.email || 'N/A'}</span>
                        </div>
                        <div class="meta-item">
                            <i class="fas fa-circle meta-icon"></i>
                            <span>${business.status}</span>
                        </div>
                    </div>
                    
                    <p class="business-description">${business.description.substring(0, 200)}...</p>
                    
                    <div class="business-details" id="details-${index}">
                        <div class="details-content">
                            <div class="detail-section">
                                <h3><i class="fas fa-file-alt"></i> Full Description</h3>
                                <p style="color: var(--color-text-secondary); line-height: 1.6;">${business.description}</p>
                            </div>

                            <div class="detail-section">
                                <h3><i class="fas fa-address-card"></i> Contact Information</h3>
                                <div class="detail-grid">
                                    <div class="detail-item"><i class="fas fa-phone meta-icon"></i> <strong>Phone:</strong> ${business.phone}</div>
                                    ${business.phoneName ? `<div class="detail-item"><i class="fas fa-user meta-icon"></i> <strong>Contact:</strong> ${business.phoneName}</div>` : ''}
                                    ${business.email ? `<div class="detail-item"><i class="fas fa-envelope meta-icon"></i> <strong>Email:</strong> ${business.email}</div>` : ''}
                                    ${business.website ? `<div class="detail-item"><i class="fas fa-globe meta-icon"></i> <strong>Website:</strong> <a href="${business.website}" target="_blank">Visit</a></div>` : ''}
                                    ${business.whatsapp ? `<div class="detail-item"><i class="fab fa-whatsapp meta-icon"></i> <strong>WhatsApp:</strong> ${business.whatsapp}</div>` : ''}
                                    ${business.instagram ? `<div class="detail-item"><i class="fab fa-instagram meta-icon"></i> <strong>Instagram:</strong> <a href="${business.instagram}" target="_blank">View</a></div>` : ''}
                                </div>
                            </div>

                            <div class="detail-section">
                                <h3><i class="fas fa-map-marker-alt"></i> Location</h3>
                                <p style="color: var(--color-text-secondary); margin-bottom: 12px;">${business.address}</p>
                                <div class="detail-grid">
                                    <div class="detail-item"><i class="fas fa-map-pin meta-icon"></i> <strong>Coordinates:</strong> ${business.coordinates.lat}, ${business.coordinates.lng}</div>
                                    ${business.mapLink ? `<div class="detail-item"><i class="fas fa-map meta-icon"></i> <a href="${business.mapLink}" target="_blank">Open in Google Maps</a></div>` : ''}
                                </div>
                            </div>

                            ${business.hours ? `
                            <div class="detail-section">
                                <h3><i class="fas fa-clock"></i> Business Hours</h3>
                                <div class="hours-grid">
                                    ${Object.entries(business.hours).map(([day, hours]) => `
                                        <div class="hour-card">
                                            <div class="hour-day">${day}</div>
                                            <div class="hour-time">
                                                ${hours.open === '00:00' && hours.close === '00:00' ? 'Closed' : 
                                                  hours.open === '00:00' && hours.close === '23:59' ? '24 Hours' :
                                                  `${hours.open} - ${hours.close}`}
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            ` : ''}

                            ${business.tags && business.tags.length > 0 ? `
                            <div class="detail-section">
                                <h3><i class="fas fa-tags"></i> Tags</h3>
                                <div class="tags-container">
                                    ${business.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                                </div>
                            </div>
                            ` : ''}

                            ${business.reviews && business.reviews.length > 0 ? `
                            <div class="detail-section">
                                <h3><i class="fas fa-star"></i> Customer Reviews</h3>
                                <div class="reviews-container">
                                    ${business.reviews.map(review => `
                                        <div class="review-card">
                                            <div class="review-header">
                                                <div>
                                                    <div class="review-author">${review.author}</div>
                                                    ${review.role ? `<div class="review-role">${review.role}</div>` : ''}
                                                </div>
                                                <div>
                                                    <div class="review-rating">${'★'.repeat(review.rating)}${'☆'.repeat(5-review.rating)}</div>
                                                    <div class="review-date">${review.date}</div>
                                                </div>
                                            </div>
                                            <p class="review-text">${review.text}</p>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            ` : ''}

                            ${business.upiId ? `
                            <div class="detail-section">
                                <h3><i class="fas fa-credit-card"></i> Payment Information</h3>
                                <div class="detail-grid">
                                    <div class="detail-item"><i class="fas fa-wallet meta-icon"></i> <strong>UPI ID:</strong> ${business.upiId}</div>
                                    ${business.upiName ? `<div class="detail-item"><i class="fas fa-user meta-icon"></i> <strong>UPI Name:</strong> ${business.upiName}</div>` : ''}
                                </div>
                            </div>
                            ` : ''}

                            <div class="action-buttons">
                                ${business.mapLink ? `<a href="${business.mapLink}" target="_blank" class="action-btn action-btn-primary"><i class="fas fa-map-marker-alt"></i> Open in Maps</a>` : ''}
                                ${business.whatsapp ? `<a href="https://wa.me/${business.whatsapp.replace(/[^0-9]/g, '')}" target="_blank" class="action-btn action-btn-success"><i class="fab fa-whatsapp"></i> WhatsApp</a>` : ''}
                                ${business.phone ? `<a href="tel:${business.phone}" class="action-btn action-btn-primary"><i class="fas fa-phone"></i> Call Now</a>` : ''}
                                ${business.website ? `<a href="${business.website}" target="_blank" class="action-btn action-btn-primary"><i class="fas fa-globe"></i> Visit Website</a>` : ''}
                                ${business.instagram ? `<a href="${business.instagram}" target="_blank" class="action-btn action-btn-danger"><i class="fab fa-instagram"></i> Instagram</a>` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
